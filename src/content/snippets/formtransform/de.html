<section>
    <p>FormTransform ist eine Web-App zur Konvertierung von <a href="https://xlsform.org/en/" target="_blank" rel="noopener noreferrer">XLSForm-Fragebögen</a> in das <a href="https://www.limesurvey.org/manual/Tab_Separated_Value_survey_structure" target="_blank" rel="noopener noreferrer">LimeSurvey-TSV-Format</a> mit anschließender Downloadmöglichkeit. Sie basiert auf dem JavaScript-Paket <a href="https://github.com/CorrelAid/xlsform2lstsv">xlsform2lstsv</a>.</p>
</section>
