<section>
    <p>FormTransform is a web app for converting <a href="https://xlsform.org/en/" target="_blank" rel="noopener noreferrer">XLSForm questionnaires</a> to the <a href="https://www.limesurvey.org/manual/Tab_Separated_Value_survey_structure" target="_blank" rel="noopener noreferrer">LimeSurvey TSV format</a> and downloading the result. It is based on the JavaScript package <a href="https://github.com/CorrelAid/xlsform2lstsv">xlsform2lstsv</a>.</p>
</section>
